            <p>鱼乐园是国清寺内的一处水池，里面养着许多金鱼。</p>
            <p>鱼乐园是国清寺的一处景点，水池中养着许多金鱼，游客可以在此喂鱼，感受与自然的亲近。水池周围环境优美，是游客休息的好去处。</p>
            
            <h2>环境特色</h2>
