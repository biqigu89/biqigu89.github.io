    <div class="container">
        <header>
            <a href="home.html" class="back-button">返回首页</a>

            <p>国清寺重要殿堂</p>
        </header>
        
        <div class="content">
            <h2>景点介绍</h2>
            <p>雨花殿是国清寺的重要殿堂之一，殿内供奉着四大天王。</p>
            <p>雨花殿得名于传说中智者大师讲经时，天上落下如雨般的花瓣。殿内的四大天王像威风凛凛，守护着寺院的平安。</p>
            
            <h2>建筑特色</h2>
            <p>雨花殿采用传统的中国古代建筑风格，飞檐翘角，斗拱交错，体现了中国古代建筑的精湛技艺。殿内的壁画和雕刻也非常精美，展现了佛教文化的深厚底蕴。</p>
            
            <h2>相关故事</h2>
            <p>据传说，智者大师在此讲经时，感动了天上的神仙，纷纷撒下花瓣，因此得名雨花殿。每年都有许多信徒前来朝拜，祈求平安和幸福。</p>
