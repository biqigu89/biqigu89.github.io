    <div class="container">
        <header>
            <a href="home.html" class="back-button">返回首页</a>

        </header>
        
        <div class="content">
            <h2>景点介绍</h2>
            <p>隋塔是国清寺的标志性建筑之一，建于隋朝，是浙江省现存最古老的佛塔之一。</p>
            <p>隋塔高约59.4米，六面九级，塔内供奉着大量佛像。据传说，隋文帝为了纪念智者大师，特意建造了这座佛塔。</p>
            
            <h2>建筑特色</h2>
            <p>隋塔采用传统的中国古代佛塔建筑风格，塔身为砖木结构，外檐有精美的雕刻。塔内有螺旋形楼梯，可登至塔顶，俯瞰国清寺全景。</p>
            
            <h2>相关故事</h2>
            <p>据传说，隋塔建造时，有一位高僧在此修行，每日绕塔诵经，最终得道成仙。因此，隋塔也成为了佛教信徒心中的圣地。</p>
