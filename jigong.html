<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>济公文化地图</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-button">返回首页</a>
            <h1>济公文化地图</h1>
            <p>点击地图上的图标，了解著名建筑和济公文化故事</p>
        </header>
        
        <main>
            <div class="map-container">
                <img src="images/map.png.jpg" alt="济公文化地图" class="map-image">
                <div class="hotspots">
                    <div class="hotspot" data-id="1" style="top: 70%; left: 15%;"></div>
                    <div class="hotspot" data-id="2" style="top: 55%; left: 25%;"></div>
                    <div class="hotspot" data-id="3" style="top: 43%; left: 50%;"></div>
                    <div class="hotspot" data-id="4" style="top: 38%; left: 40%;"></div>
                    <div class="hotspot" data-id="5" style="top: 50%; left: 75%;"></div>
                    <div class="hotspot" data-id="6" style="top: 80%; left: 65%;"></div>
                    <div class="hotspot" data-id="7" style="top: 30%; left: 75%;"></div>
                    <div class="hotspot" data-id="8" style="top: 80%; left: 45%;"></div>
                    <div class="hotspot" data-id="9" style="top: 70%; left: 60%;"></div>
                    <div class="hotspot" data-id="10" style="top: 65%; left: 85%;"></div>
                </div>
            </div>
            
            <div class="info-panel">
                <h2 id="info-title">济公文化地图</h2>
                <div id="info-content">
                    <p>欢迎来到济公文化地图，点击地图上的红色图标跳转到相应景点的详细介绍页面，了解更多关于这些著名建筑和济公文化的故事。</p>
                    <p>地图上的景点包括：</p>
                    <ul>
                        <li>1. 永宁村碑</li>
                        <li>2. 展堂</li>
                        <li>3. 济公像</li>
                        <li>4. 钓月亭</li>
                        <li>5. 祖宫</li>
                        <li>6. 济公墙</li>
                        <li>7. 观霞阁</li>
                        <li>8. 古井</li>
                        <li>9. 罗汉神木</li>
                        <li>10. 醉仙楼</li>
                    </ul>
                </div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 济公文化地图</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
