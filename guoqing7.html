            <h2>景点介绍</h2>
            <p>隋代石刹是国清寺的重要文物，建于隋朝，是研究古代建筑艺术的重要资料。</p>
            <p>隋代石刹造型精美，雕刻细腻，是隋朝建筑艺术的杰出代表。石刹上的图案和文字，为研究隋朝的历史和文化提供了重要线索。</p>
            
            <h2>建筑特色</h2>
            <p>隋代石刹采用传统的中国古代建筑风格，造型独特，雕刻精美。石刹上的图案包括佛像、花卉和几何图形，展现了隋朝时期的艺术风格。</p>
            
            <h2>相关故事</h2>
            <p>据传说，隋代石刹是隋文帝为了纪念智者大师而建造的，是国清寺的镇寺之宝。每年都有许多学者和游客前来参观，研究这一重要的历史文物。</p>
